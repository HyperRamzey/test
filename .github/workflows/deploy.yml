name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: website/package-lock.json
        
    - name: Install dependencies
      working-directory: ./website
      run: npm ci
      
    - name: Build with cache busting
      working-directory: ./website
      run: npm run build:prod
      env:
        NODE_ENV: production
        VERSION: ${{ github.sha }}
        
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './website'
        
    - name: Generate deployment info
      run: |
        echo "Deployment completed at $(date)" >> website/deployment.log
        echo "Commit: ${{ github.sha }}" >> website/deployment.log
        echo "Branch: ${{ github.ref }}" >> website/deployment.log
        echo "Version: ${{ github.sha }}" >> website/deployment.log

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4 
